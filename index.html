<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Reveal with Sound</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: Arial, sans-serif;
        overflow: hidden;
        background: black;
    }

    /* Background meme */
    .bg {
        position: fixed;
        width: 100%;
        height: 100%;
        background: url("modipaglu.jfif") center/cover no-repeat;
        opacity: 0;
        transition: opacity 1s ease;
        z-index: -1;
    }

    .show-bg {
        opacity: 1;
    }

    .box {
        width: 300px;
        height: 200px;
        background: #222;
        position: relative;
        cursor: pointer;
        overflow: hidden;
        border-radius: 10px;
    }

    .cover {
        position: absolute;
        width: 100%;
        height: 100%;
        background: crimson;
        top: 0;
        left: 0;
        transform-origin: left;
        transition: transform 1s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 20px;
    }

    .box.open .cover {
        transform: rotateY(-120deg);
    }

    .content {
        position: absolute;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-size: 22px;
        opacity: 0;
        transition: opacity 1s ease 0.5s;
    }

    .box.open .content {
        opacity: 1;
    }
</style>

</head>
<body>

<div class="bg" id="bg"></div>

<div class="box" onclick="openBox()" id="box">
    <div class="cover">Click to Open</div>
    <div class="content">Modi hai to mumkin hai</div>
</div>

<!-- Audio (different IDs) -->
<audio id="audio1" src="modi-ji-bkl.mp3"></audio>
<audio id="audio2" src="modi-ji-bhojyam.mp3"></audio>

<script>
    function openBox() {
        let box = document.getElementById("box");
        let bg = document.getElementById("bg");
        let audio1 = document.getElementById("audio1");
        let audio2 = document.getElementById("audio2");

        box.classList.toggle("open");

        // Show background meme
        bg.classList.add("show-bg");

        // Play first audio immediately
        audio1.play();

        // Play second audio after 3 seconds
        setTimeout(() => {
            audio2.play();
        }, 3000);
    }
</script>

</body>
</html>
